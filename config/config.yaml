data:
  raw_data_path: data/Churn_Modelling.csv
  processed_data_path: data/processed/churn_data.csv
  test_size: 0.2
  random_state: 42

model:
  algorithm:
    - name: logistic_regression
      parameters:
        C: 1.0
        max_iter: 1000
    - name: random_forest
      parameters:
        n_estimators: 100
        max_depth: 10
        min_samples_split: 2
    - name: xgboost
      parameters:
        n_estimators: 100
        learning_rate: 0.1
        max_depth: 6
  
  best_model_path: models/best_model.pkl

metrics:
  track:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

